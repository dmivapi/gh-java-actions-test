name: Test Lint workflow
on: [push, workflow_dispatch]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
      - name: Java setup
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'
          cache: 'gradle'
      - name: Check style
        run: ./gradlew spotlessCheck
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
      - name: Java setup
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'
          cache: 'gradle'
      - name: Tests running
        run: ./gradlew test
  deploy:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Deploy
        run: echo "Deploying ..."