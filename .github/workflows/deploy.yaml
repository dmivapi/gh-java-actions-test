name: CI/CD
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      jar-name: ${{ steps.publish-jar.outputs.jar-name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'
          cache: 'gradle'
      - run: ./gradlew build
      - id: publish-jar
        run: find build/libs -name "*.jar" -type f -execdir echo "jar-name={}" >> $GITHUB_OUTPUT ";"
      - uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: |
            build/libs/*.jar
#            !build/libs/*-plain.jar
# no need to exclude if "jar" task disabled in gradle.
  output:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ needs.build.outputs.jar-name }}
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: app-jar
      - run: ls
      - name: Deploy
        run: echo "Deploying ..."